covered_call_tickers:
  - MSFT
  - AAPL
  - NVDA
  - TQQQ

cash_secured_put_tickers:
  - TQQQ
  - TECL
  - NVDA
  - AMD
  - TSM

max_candidates_per_ticker_per_bucket: 5
options_data_provider: public
market_data_provider: yfinance
fundamentals_provider: yfinance
public_api_base_url: https://api.public.com
public_api_key_env_var: PUBLIC_API_KEY
public_access_token_validity_minutes: 15
public_http_timeout_seconds: 20
public_account_id: null
public_underlying_instrument_type: EQUITY
delta_put_min: -0.25
delta_put_max: -0.1
delta_call_min: 0.1
delta_call_max: 0.25

max_dte: 45              # Hard cap — expirations beyond this are ignored
short_term_max_dte: 14   # DTE ≤ 14 → Short-Term  (all expirations fetched)
medium_term_max_dte: 28  # DTE ≤ 28 → Medium-Term (Fridays only beyond 14 DTE)

min_open_interest: null
min_volume: null
max_spread_pct: null
html_min_mid_price: 0.5
min_annualized_yield: 0.12
risk_free_rate: 0.05

put_otm_pct_min: 0.05
put_otm_pct_max: 0.15
call_otm_pct_min: 0.05
call_otm_pct_max: 0.15

earnings_risk_penalty: 0.20

# ── Covered Call Recommendation Engine ────────────────────────────────────────
# Set enabled: false to skip CC recommendations entirely.
cc_recommendation:
  enabled: true
  max_recommendations: 50       # Safety cap on total rows output
  max_suggestions_per_term: 3   # Top N suggestions per term (Short-Term / Monthly) per ticker
  earnings_buffer_days: 7       # Mark as "No" if earnings fall within N days of expiration
  delta_min: 0.10               # |delta| lower bound for a "Yes" verdict
  delta_max: 0.25               # |delta| upper bound for a "Yes" verdict
  use_resistance_filter: true   # Flag strikes near resistance levels
  resistance_pct_buffer: 0.02   # "Near resistance" if within 2% of a resistance level
  min_acceptable_sale_prices:   # Optional per-ticker minimum strike (e.g. cost basis)
    # MSFT: 380.0
    # AAPL: 175.0
    # NVDA: 100.0
    # TQQQ: 50.0

# ── CSP Recommendation Engine ─────────────────────────────────────────────────
# Set enabled: false to skip recommendations entirely.
# All criteria below are optional — set a value to null to disable that check.
csp_recommendation:
  enabled: true
  max_recommendations: 30      # Max rows shown in the recommendation table
  ivr_min: 30.0                # IV Rank proxy must exceed this % (null = skip check)
  earnings_buffer_days: 7      # Reject if earnings fall within N days of expiration
  delta_min: 0.10              # |delta| lower bound for recommended strike
  delta_max: 0.25              # |delta| upper bound for recommended strike
  use_support_filter: true     # Require strike at/below a support level (set false to skip)
  support_pct_buffer: 0.02     # Allow strike up to 2% above a support level

output_dir: ./reports
log_dir: ./logs
cache_dir: ./cache
price_history_period: 1y
price_history_interval: 1d
